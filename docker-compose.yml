version: '3.9'

services:
  db:
    image: postgres:15
    container_name: microbank-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    networks:
      - microbank-network

  client-service:
    build: ./services/client-service
    container_name: client-service
    depends_on:
      - db
    env_file: .env
    networks:
      - microbank-network
    ports:
      - '8000:8000'
    command: sh -c "python manage.py migrate && python manage.py seed_admin && gunicorn client_service.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  banking-service:
    build: ./services/banking-service
    container_name: banking-service
    depends_on:
      - db
    env_file: .env
    networks:
      - microbank-network
    ports:
      - '8001:8001'
    command: sh -c "python manage.py migrate && gunicorn banking_service.wsgi:application --bind 0.0.0.0:8001 --workers 3"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: client
    depends_on:
      - client-service
      - banking-service
    env_file: .env
    networks:
      - microbank-network
    ports:
      - '3000:3000'
    command: sh -c "npm install && npm run build && npm start"

networks:
  microbank-network:
    driver: bridge
