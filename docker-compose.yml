version: '3.9'

services:
  nginx:
    image: nginx:1.25-alpine
    build: ./nginx
    container_name: microbank-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - client
      - client-service
      - banking-service
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [appnet]

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: microbank
      RABBITMQ_DEFAULT_PASS: microbank
    ports:
      - '15672:15672' # management UI
    networks: [appnet]

  client-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: client_user
      POSTGRES_PASSWORD: client_pass
      POSTGRES_DB: client_db
    volumes:
      - client-db-data:/var/lib/postgresql/data
    networks: [appnet]

  banking-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: banking_user
      POSTGRES_PASSWORD: banking_pass
      POSTGRES_DB: banking_db
    volumes:
      - banking-db-data:/var/lib/postgresql/data
    networks: [appnet]

  client-service:
    build: ./services/client-service
    env_file: ./services/client-service/.env
    depends_on:
      - client-db
      - rabbitmq
    networks: [appnet]

  banking-service:
    build: ./services/banking-service
    env_file: ./services/banking-service/.env
    depends_on:
      - banking-db
      - rabbitmq
      - client-service
    networks: [appnet]

  banking-consumer:
    build: ./services/banking-service
    env_file: ./services/banking-service/.env
    command: sh -c "python manage.py migrate && python manage.py sync_blacklist_once && python manage.py consume_blacklist"
    depends_on:
      - banking-db
      - rabbitmq
      - client-service
    networks: [appnet]

  client:
    build: ./client
    container_name: microbank-client
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_BASE=/api
    depends_on:
      - client-service
      - banking-service
    networks: [appnet]

volumes:
  client-db-data:
  banking-db-data:

networks:
  appnet:
    driver: bridge
