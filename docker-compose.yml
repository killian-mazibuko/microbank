version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: microbank_postgres
    environment:
      POSTGRES_USER: microbank
      POSTGRES_PASSWORD: microbank123
      POSTGRES_DB: microbank_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  client-service:
    build:
      context: ./services/client-service
      dockerfile: Dockerfile
    container_name: client-service
    env_file:
      - ./services/client-service/.env
    ports:
      - '8000:8000'
    depends_on:
      - postgres

  banking-service:
    build:
      context: ./services/banking-service
      dockerfile: Dockerfile
    container_name: banking-service
    env_file:
      - ./services/banking-service/.env
    ports:
      - '8001:8001'
    depends_on:
      - postgres
      - client-service

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: microbank-client
    ports:
      - '3000:3000'
    depends_on:
      - client-service
      - banking-service
    environment:
      NEXT_PUBLIC_CLIENT_SERVICE_URL: http://client-service:8000
      NEXT_PUBLIC_BANKING_SERVICE_URL: http://banking-service:8001

volumes:
  pgdata:
