user  nginx;
worker_processes  auto;

events { worker_connections  1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile        on;
  keepalive_timeout  65;

  # Simple rate limiting for sensitive endpoints
  limit_req_zone $binary_remote_addr zone=banking_zone:10m rate=10r/m;

  upstream client_service {
    server client-service:8000;
  }

  upstream banking_service {
    server banking-service:8001;
  }

  upstream next_client {
    server client:3000;
  }

  server {
    listen 80;
    server_name _;

    # Frontend app
    location / {
      proxy_pass http://next_client;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Client Service
    location /api/client/ {
      proxy_pass http://client_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Banking Service
    location ~ ^/api/banking/(deposit|withdraw) {
      limit_req zone=banking_zone burst=5 nodelay;
      proxy_pass http://banking_service/$1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/banking/ {
      proxy_pass http://banking_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
